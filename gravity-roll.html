<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0c10">
    <title>GRAVITY ROLL</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
        body{background:#050608;display:flex;align-items:center;justify-content:center;min-height:100dvh;font-family:'Outfit',system-ui,sans-serif;overflow:hidden}
        #gameContainer{width:100%;max-width:420px;height:100dvh;max-height:900px;background:#0d1117;overflow:hidden;position:relative}
        canvas{display:block;width:100%;height:100%;touch-action:none}

        #hud{position:absolute;top:0;left:0;width:100%;padding:16px 20px 0;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none;z-index:10}
        .hud-pill{font-family:'Space Mono',monospace;font-size:.85rem;font-weight:700;color:rgba(255,255,255,.9);background:rgba(0,0,0,.45);padding:8px 16px;border-radius:100px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:6px;transition:transform .15s ease}
        .hud-pill .icon{font-size:.7rem;opacity:.5}
        #levelBadge{position:absolute;top:16px;left:50%;transform:translateX(-50%);font-family:'Outfit',sans-serif;font-size:.7rem;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.35);pointer-events:none;z-index:10;transition:color .5s ease}

        #powerUpBar{position:absolute;top:52px;left:50%;transform:translateX(-50%);display:flex;gap:6px;pointer-events:none;z-index:10}
        .pu-indicator{font-size:.65rem;font-weight:800;letter-spacing:1px;padding:4px 12px;border-radius:100px;color:#fff;opacity:0;transition:opacity .3s,transform .3s;transform:translateY(-4px)}
        .pu-indicator.active{opacity:1;transform:translateY(0)}
        .pu-gravity{background:rgba(100,200,255,.3);border:1px solid rgba(100,200,255,.4)}
        .pu-speed{background:rgba(255,100,100,.3);border:1px solid rgba(255,100,100,.4)}
        .pu-timer{font-variant-numeric:tabular-nums}

        #comboDisplay{position:absolute;top:80px;left:50%;transform:translateX(-50%);font-family:'Outfit',sans-serif;font-size:.75rem;font-weight:800;letter-spacing:2px;color:rgba(255,216,102,.8);pointer-events:none;z-index:10;opacity:0;transition:opacity .4s}

        .overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px;text-align:center;color:#fff}

        #startScreen{background:radial-gradient(ellipse at 50% 30%,rgba(25,35,60,.95),rgba(5,6,8,.98));backdrop-filter:blur(20px);z-index:20}
        .logo-text{font-family:'Outfit',sans-serif;font-size:2.8rem;font-weight:900;letter-spacing:-1px;background:linear-gradient(135deg,#ffd866,#ff9f43,#ffd866);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px;filter:drop-shadow(0 4px 12px rgba(255,159,67,.3))}
        .logo-sub{font-size:.7rem;font-weight:600;letter-spacing:6px;text-transform:uppercase;color:rgba(255,255,255,.25);margin-bottom:30px}

        .tab-bar{display:flex;gap:0;margin-bottom:24px;border-radius:100px;overflow:hidden;border:1px solid rgba(255,255,255,.08);background:rgba(0,0,0,.3)}
        .tab-btn{font-family:'Outfit',sans-serif;font-size:.7rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:10px 18px;border:none;background:transparent;color:rgba(255,255,255,.35);cursor:pointer;transition:all .2s}
        .tab-btn.active{background:rgba(255,216,102,.12);color:#ffd866}

        .tab-content{display:none;width:100%;max-width:300px;min-height:260px}
        .tab-content.active{display:flex;flex-direction:column;align-items:center}

        .main-btn{font-family:'Outfit',sans-serif;border:none;border-radius:100px;padding:18px 56px;font-size:1.15rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .12s;position:relative;overflow:hidden}
        #startBtn{background:linear-gradient(135deg,#ffd866,#ff9f43);color:#1a1000;box-shadow:0 8px 32px rgba(255,159,67,.35),inset 0 1px 0 rgba(255,255,255,.3)}
        #startBtn:active{transform:scale(.95);box-shadow:0 4px 16px rgba(255,159,67,.25)}
        .how-to{margin-top:24px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:16px 20px;font-size:.8rem;line-height:1.8;color:rgba(255,255,255,.4);max-width:280px}
        .how-to .key{display:inline-block;background:rgba(255,216,102,.15);color:#ffd866;padding:2px 10px;border-radius:100px;font-weight:700;font-size:.75rem;margin:0 2px}

        .ach-list{width:100%;max-height:240px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;padding-right:4px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent}
        .ach-list::-webkit-scrollbar{width:4px}
        .ach-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:4px}
        .ach-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:12px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.04);text-align:left;transition:all .3s}
        .ach-item.unlocked{background:rgba(255,216,102,.06);border-color:rgba(255,216,102,.12)}
        .ach-icon{font-size:1.3rem;width:32px;text-align:center;filter:grayscale(1) opacity(.3);transition:filter .3s}
        .ach-item.unlocked .ach-icon{filter:none}
        .ach-info{flex:1;min-width:0}
        .ach-name{font-size:.75rem;font-weight:700;color:rgba(255,255,255,.5);margin-bottom:2px}
        .ach-item.unlocked .ach-name{color:rgba(255,216,102,.9)}
        .ach-desc{font-size:.65rem;color:rgba(255,255,255,.25);line-height:1.3}
        .ach-item.unlocked .ach-desc{color:rgba(255,255,255,.4)}

        .settings-group{width:100%;display:flex;flex-direction:column;gap:16px;padding:4px 0}
        .setting-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
        .setting-label{font-size:.8rem;font-weight:600;color:rgba(255,255,255,.5)}
        .setting-control{display:flex;align-items:center;gap:10px}
        input[type=range]{-webkit-appearance:none;appearance:none;width:120px;height:4px;border-radius:2px;background:rgba(255,255,255,.12);outline:none}
        input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#ffd866;cursor:pointer;box-shadow:0 2px 8px rgba(255,216,102,.3)}
        .vol-val{font-family:'Space Mono',monospace;font-size:.7rem;color:rgba(255,255,255,.35);width:32px;text-align:right}
        .toggle{width:44px;height:24px;border-radius:12px;background:rgba(255,255,255,.12);border:none;cursor:pointer;position:relative;transition:background .2s}
        .toggle.on{background:rgba(255,216,102,.3)}
        .toggle::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:rgba(255,255,255,.6);transition:transform .2s}
        .toggle.on::after{transform:translateX(20px);background:#ffd866}

        #gameOverScreen{background:rgba(5,6,8,.92);backdrop-filter:blur(16px);display:none;z-index:30}
        .go-title{font-size:1rem;font-weight:800;letter-spacing:6px;text-transform:uppercase;color:rgba(255,107,107,.7);margin-bottom:20px}
        .go-score-label{font-size:.65rem;font-weight:600;letter-spacing:4px;text-transform:uppercase;color:rgba(255,255,255,.25);margin-bottom:6px}
        .go-score{font-family:'Space Mono',monospace;font-size:3.5rem;font-weight:700;color:#fff;margin-bottom:4px}
        .go-best{font-family:'Space Mono',monospace;font-size:.8rem;color:rgba(255,255,255,.25);margin-bottom:4px}
        #newHigh{font-size:.8rem;font-weight:700;color:#ffd866;margin-bottom:12px;min-height:1.2em}
        .go-stats{display:flex;gap:20px;margin-bottom:24px}
        .go-stat{text-align:center}
        .go-stat-val{font-family:'Space Mono',monospace;font-size:1.1rem;font-weight:700;color:rgba(255,255,255,.7)}
        .go-stat-label{font-size:.55rem;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.25);margin-top:2px}
        #restartBtn{background:rgba(255,255,255,.08);color:rgba(255,255,255,.85);border:1px solid rgba(255,255,255,.12);box-shadow:0 4px 20px rgba(0,0,0,.3);font-family:'Outfit',sans-serif;border-radius:100px;padding:16px 48px;font-size:1.05rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .12s}
        #restartBtn:active{transform:scale(.95);background:rgba(255,255,255,.12)}

        #achToast{position:absolute;top:100px;left:50%;transform:translateX(-50%) translateY(-20px);background:rgba(0,0,0,.7);backdrop-filter:blur(12px);border:1px solid rgba(255,216,102,.2);border-radius:14px;padding:10px 18px;display:flex;align-items:center;gap:10px;z-index:25;pointer-events:none;opacity:0;transition:all .4s ease}
        #achToast.show{opacity:1;transform:translateX(-50%) translateY(0)}
        #achToast .toast-icon{font-size:1.2rem}
        #achToast .toast-text{font-size:.7rem;font-weight:700;color:rgba(255,216,102,.9);letter-spacing:1px}

        #readyText{position:absolute;bottom:90px;left:0;width:100%;text-align:center;color:rgba(255,255,255,.4);font-size:.8rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;animation:breathe 2s ease-in-out infinite;pointer-events:none;z-index:15;display:none}
        @keyframes breathe{0%,100%{opacity:.3}50%{opacity:.8}}

        #levelUpFlash{position:absolute;inset:0;display:none;align-items:center;justify-content:center;pointer-events:none;z-index:12}
        .level-up-text{font-family:'Outfit',sans-serif;font-size:1.8rem;font-weight:900;letter-spacing:4px;text-transform:uppercase;color:#fff;text-shadow:0 0 40px rgba(255,216,102,.6);opacity:0;animation:levelFlash 1.8s ease-out forwards}
        @keyframes levelFlash{0%{opacity:0;transform:scale(.7)}15%{opacity:1;transform:scale(1.05)}60%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(1) translateY(-20px)}}

        @media(max-width:420px){#gameContainer{max-width:100%;max-height:100dvh;border-radius:0}}
        @media(min-width:421px){#gameContainer{border-radius:32px;box-shadow:0 20px 80px rgba(0,0,0,.9)}}
    </style>
</head>
<body>
<div id="gameContainer">
    <canvas id="gameCanvas"></canvas>

    <div id="hud">
        <div class="hud-pill"><span class="icon">●</span> <span id="score">0</span></div>
        <div class="hud-pill"><span class="icon">♛</span> <span id="highScore">0</span></div>
    </div>
    <div id="levelBadge">LEVEL 1</div>
    <div id="powerUpBar">
        <div class="pu-indicator pu-gravity" id="puGravInd">⟳ ZERO-G <span class="pu-timer" id="puGravTimer">5s</span></div>
        <div class="pu-indicator pu-speed" id="puSpeedInd">⚡ BOOST <span class="pu-timer" id="puSpeedTimer">5s</span></div>
    </div>
    <div id="comboDisplay"></div>

    <div id="startScreen" class="overlay">
        <div class="logo-text">GRAVITY ROLL</div>
        <div class="logo-sub">Das Schwerkraft-Spiel</div>
        <div class="tab-bar">
            <button class="tab-btn active" data-tab="play">Spielen</button>
            <button class="tab-btn" data-tab="achievements">Erfolge</button>
            <button class="tab-btn" data-tab="settings">Settings</button>
        </div>
        <div class="tab-content active" id="tab-play">
            <button id="startBtn" class="main-btn">START</button>
            <div class="how-to">
                <span class="key">TIPPEN</span> wechselt die Schwerkraft<br>
                Weiche den Wänden aus &amp; sammle Power-Ups<br>
                Je weiter du kommst, desto schneller wird es
            </div>
        </div>
        <div class="tab-content" id="tab-achievements">
            <div class="ach-list" id="achList"></div>
        </div>
        <div class="tab-content" id="tab-settings">
            <div class="settings-group">
                <div class="setting-row">
                    <span class="setting-label">Lautstärke</span>
                    <div class="setting-control">
                        <input type="range" id="volSlider" min="0" max="100" value="70">
                        <span class="vol-val" id="volVal">70%</span>
                    </div>
                </div>
                <div class="setting-row">
                    <span class="setting-label">Stumm</span>
                    <button class="toggle" id="muteToggle"></button>
                </div>
            </div>
        </div>
    </div>

    <div id="gameOverScreen" class="overlay">
        <div class="go-title">GAME OVER</div>
        <div class="go-score-label">SCORE</div>
        <div class="go-score" id="finalScore">0</div>
        <div class="go-best" id="bestDisplay">BEST: 0</div>
        <div id="newHigh"></div>
        <div class="go-stats">
            <div class="go-stat"><div class="go-stat-val" id="goLevel">1</div><div class="go-stat-label">Level</div></div>
            <div class="go-stat"><div class="go-stat-val" id="goItems">0</div><div class="go-stat-label">Items</div></div>
            <div class="go-stat"><div class="go-stat-val" id="goCombo">0</div><div class="go-stat-label">Max Combo</div></div>
        </div>
        <button id="restartBtn">NOCHMAL</button>
    </div>

    <div id="readyText">TIPPEN ZUM STARTEN</div>
    <div id="levelUpFlash"><div class="level-up-text" id="levelUpText"></div></div>
    <div id="achToast"><span class="toast-icon" id="toastIcon">🏆</span><span class="toast-text" id="toastText"></span></div>
</div>

<script>
(function(){
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');

const startScreen=document.getElementById('startScreen');
const gameOverScreen=document.getElementById('gameOverScreen');
const startBtn=document.getElementById('startBtn');
const restartBtn=document.getElementById('restartBtn');
const scoreSpan=document.getElementById('score');
const highScoreSpan=document.getElementById('highScore');
const finalScoreSpan=document.getElementById('finalScore');
const bestDisplay=document.getElementById('bestDisplay');
const newHighSpan=document.getElementById('newHigh');
const readyText=document.getElementById('readyText');
const levelBadge=document.getElementById('levelBadge');
const levelUpFlash=document.getElementById('levelUpFlash');
const levelUpText=document.getElementById('levelUpText');
const comboDisplay=document.getElementById('comboDisplay');
const puGravInd=document.getElementById('puGravInd');
const puGravTimer=document.getElementById('puGravTimer');
const puSpeedInd=document.getElementById('puSpeedInd');
const puSpeedTimer=document.getElementById('puSpeedTimer');
const achList=document.getElementById('achList');
const achToast=document.getElementById('achToast');
const toastIcon=document.getElementById('toastIcon');
const toastText=document.getElementById('toastText');
const goLevel=document.getElementById('goLevel');
const goItems=document.getElementById('goItems');
const goCombo=document.getElementById('goCombo');

// ========== TABS ==========
document.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
        document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-'+btn.dataset.tab).classList.add('active');
    });
});

// ========== SOUND (Web Audio API) ==========
let audioCtx=null;
let sfxVolume=0.7;
let sfxMuted=false;

function ensureAudio(){
    if(!audioCtx){try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){return;}}
    if(audioCtx.state==='suspended')audioCtx.resume();
}

function playTone(freq,dur,type,vol,ramp){
    if(sfxMuted||!audioCtx)return;
    try{
        const v=(vol||1)*sfxVolume;
        const o=audioCtx.createOscillator();
        const g=audioCtx.createGain();
        o.type=type||'sine';
        o.frequency.setValueAtTime(freq,audioCtx.currentTime);
        if(ramp)o.frequency.exponentialRampToValueAtTime(ramp,audioCtx.currentTime+dur);
        g.gain.setValueAtTime(v*0.12,audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
        o.connect(g);g.connect(audioCtx.destination);
        o.start();o.stop(audioCtx.currentTime+dur);
    }catch(e){}
}

function sfxTap(){ensureAudio();playTone(600,.08,'sine',.7,800);}
function sfxScore(){ensureAudio();playTone(880,.1,'sine',.5);setTimeout(()=>playTone(1100,.08,'sine',.4),50);}
function sfxLevelUp(){ensureAudio();playTone(523,.12,'triangle',.6);setTimeout(()=>playTone(659,.12,'triangle',.6),90);setTimeout(()=>playTone(784,.18,'triangle',.7),180);}
function sfxGameOver(){ensureAudio();playTone(300,.3,'sawtooth',.3,80);}
function sfxPuSpawn(){ensureAudio();playTone(1200,.18,'sine',.25,1600);}
function sfxPuCollect(){ensureAudio();playTone(700,.08,'sine',.6);setTimeout(()=>playTone(900,.08,'sine',.5),60);setTimeout(()=>playTone(1200,.12,'sine',.5),120);}
function sfxAchieve(){ensureAudio();playTone(523,.1,'triangle',.7);setTimeout(()=>playTone(659,.1,'triangle',.7),70);setTimeout(()=>playTone(784,.1,'triangle',.7),140);setTimeout(()=>playTone(1047,.2,'triangle',.8),210);}

// Settings UI
const volSlider=document.getElementById('volSlider');
const volVal=document.getElementById('volVal');
const muteToggle=document.getElementById('muteToggle');
try{
    let sv=localStorage.getItem('gr_vol');if(sv!==null){sfxVolume=parseFloat(sv);volSlider.value=Math.round(sfxVolume*100);volVal.textContent=Math.round(sfxVolume*100)+'%';}
    let sm=localStorage.getItem('gr_mute');if(sm==='1'){sfxMuted=true;muteToggle.classList.add('on');}
}catch(e){}
volSlider.addEventListener('input',()=>{sfxVolume=volSlider.value/100;volVal.textContent=volSlider.value+'%';try{localStorage.setItem('gr_vol',String(sfxVolume));}catch(e){}});
muteToggle.addEventListener('click',()=>{sfxMuted=!sfxMuted;muteToggle.classList.toggle('on',sfxMuted);try{localStorage.setItem('gr_mute',sfxMuted?'1':'0');}catch(e){}});

// ========== ACHIEVEMENTS ==========
const ACHIEVEMENTS=[
    {id:'first_point',icon:'⭐',name:'Erster Punkt',desc:'Erziele deinen ersten Punkt'},
    {id:'score_10',icon:'🔟',name:'Zehn!',desc:'Erreiche 10 Punkte'},
    {id:'score_50',icon:'🔥',name:'Fifty!',desc:'Erreiche 50 Punkte'},
    {id:'score_100',icon:'💯',name:'Century',desc:'Erreiche 100 Punkte'},
    {id:'level_5',icon:'🚀',name:'Aufsteiger',desc:'Erreiche Level 5'},
    {id:'level_10',icon:'🌟',name:'Dekade',desc:'Erreiche Level 10'},
    {id:'first_powerup',icon:'✨',name:'Power Up!',desc:'Sammle dein erstes Power-Up'},
    {id:'gravity_flip',icon:'⟳',name:'Schwerelosigkeit',desc:'Sammle eine Schwerkraft-Umkehr'},
    {id:'speed_boost',icon:'⚡',name:'Speed Demon',desc:'Sammle einen Geschwindigkeitsschub'},
    {id:'collector_5',icon:'🧲',name:'Sammler',desc:'Sammle 5 Power-Ups in einem Spiel'},
    {id:'collector_10',icon:'💎',name:'Magnet',desc:'Sammle 10 Power-Ups in einem Spiel'},
    {id:'combo_3',icon:'🔗',name:'Combo!',desc:'3er Item-Combo'},
    {id:'combo_5',icon:'⛓️',name:'Kettenreaktion',desc:'5er Item-Combo'},
    {id:'survivor',icon:'🛡️',name:'Survivor',desc:'Überlebe 2 Minuten'},
    {id:'no_powerup_30',icon:'🎯',name:'Purist',desc:'30 Punkte ohne Power-Ups'},
];
let unlockedAch={};
try{let sa=localStorage.getItem('gr_ach_v1');if(sa)unlockedAch=JSON.parse(sa);}catch(e){}
function saveAch(){try{localStorage.setItem('gr_ach_v1',JSON.stringify(unlockedAch));}catch(e){}}

let achToastQueue=[];
let achToastActive=false;

function unlockAch(id){
    if(unlockedAch[id])return;
    unlockedAch[id]=Date.now();saveAch();
    const a=ACHIEVEMENTS.find(x=>x.id===id);if(!a)return;
    achToastQueue.push(a);
    if(!achToastActive)showNextToast();
    renderAchievements();
}

function showNextToast(){
    if(achToastQueue.length===0){achToastActive=false;return;}
    achToastActive=true;
    const a=achToastQueue.shift();
    toastIcon.textContent=a.icon;
    toastText.textContent=a.name;
    achToast.classList.add('show');
    sfxAchieve();
    setTimeout(()=>{achToast.classList.remove('show');setTimeout(showNextToast,300);},2200);
}

function renderAchievements(){
    achList.innerHTML='';
    for(const a of ACHIEVEMENTS){
        const u=!!unlockedAch[a.id];
        const el=document.createElement('div');
        el.className='ach-item'+(u?' unlocked':'');
        el.innerHTML=`<div class="ach-icon">${a.icon}</div><div class="ach-info"><div class="ach-name">${a.name}</div><div class="ach-desc">${a.desc}</div></div>`;
        achList.appendChild(el);
    }
}
renderAchievements();

// ========== GAME STATE ==========
let gameActive=false,gameStarted=false;
let score=0,highScore=0;
let floatOffset=0,frameCount=0,scrollOffset=0;
let currentLevel=1,lastLevel=1;
let itemsCollected=0,maxCombo=0,comboCount=0,comboTimer=0;
let noPowerUpRun=true,gameStartTime=0;
let activePU={gravity:{on:false,t:0},speed:{on:false,t:0}};

// ========== THEMES ==========
const themes=[
    {bgTop:[13,25,45],bgBot:[6,12,22],wallColor:[80,140,200],wallGlow:[100,170,255],ballColor1:[255,216,102],ballColor2:[212,155,42],ballGlow:[255,216,102],accentAlpha:.12,stripColor:[30,55,85],particleColor:[100,170,255]},
    {bgTop:[50,15,35],bgBot:[20,8,18],wallColor:[220,80,120],wallGlow:[255,100,150],ballColor1:[255,180,60],ballColor2:[240,100,40],ballGlow:[255,150,50],accentAlpha:.15,stripColor:[70,25,50],particleColor:[255,120,160]},
    {bgTop:[10,40,25],bgBot:[5,18,12],wallColor:[60,180,100],wallGlow:[80,255,130],ballColor1:[180,255,100],ballColor2:[80,200,50],ballGlow:[140,255,80],accentAlpha:.12,stripColor:[20,55,35],particleColor:[80,255,130]},
    {bgTop:[25,15,55],bgBot:[10,8,28],wallColor:[140,80,255],wallGlow:[180,120,255],ballColor1:[200,180,255],ballColor2:[120,80,220],ballGlow:[160,140,255],accentAlpha:.14,stripColor:[40,25,75],particleColor:[160,120,255]},
    {bgTop:[55,25,5],bgBot:[28,12,3],wallColor:[255,140,40],wallGlow:[255,180,60],ballColor1:[255,255,150],ballColor2:[255,180,40],ballGlow:[255,220,80],accentAlpha:.16,stripColor:[75,40,15],particleColor:[255,160,50]},
    {bgTop:[5,5,15],bgBot:[2,2,8],wallColor:[255,255,255],wallGlow:[200,200,255],ballColor1:[255,255,255],ballColor2:[180,180,220],ballGlow:[200,200,255],accentAlpha:.08,stripColor:[15,15,30],particleColor:[180,180,255]}
];
let currentTheme={},displayTheme={};
function lC(a,b,t){return[a[0]+(b[0]-a[0])*t,a[1]+(b[1]-a[1])*t,a[2]+(b[2]-a[2])*t];}
function lV(a,b,t){return a+(b-a)*t;}
function getTheme(level){
    const idx=Math.min(Math.floor((level-1)/10),themes.length-1);
    const nxt=Math.min(idx+1,themes.length-1);
    const lv=(level-1)%10;let t=0;
    if(lv>=6&&idx!==nxt)t=(lv-6)/4;
    const a=themes[idx],b=themes[nxt];
    const r={};
    for(const k of Object.keys(a)){
        r[k]=Array.isArray(a[k])?lC(a[k],b[k],t):(typeof a[k]==='number'?lV(a[k],b[k],t):a[k]);
    }
    return r;
}
function initDT(t){displayTheme=JSON.parse(JSON.stringify(t));}
function lerpDT(tgt,s){
    s=s||.02;
    for(const k of Object.keys(tgt)){
        if(Array.isArray(tgt[k])){for(let i=0;i<3;i++)displayTheme[k][i]+=(tgt[k][i]-displayTheme[k][i])*s;}
        else if(typeof tgt[k]==='number')displayTheme[k]+=(tgt[k]-displayTheme[k])*s;
    }
}
function rgb(a){return`rgb(${a[0]|0},${a[1]|0},${a[2]|0})`;}
function rgba(a,al){return`rgba(${a[0]|0},${a[1]|0},${a[2]|0},${al})`;}

// ========== DIFFICULTY ==========
function getDiff(level){
    const l=Math.min(level,60),t=(l-1)/59;
    return{baseSpeed:1.2+t*1.8,gapSize:175-t*65,spawnDist:480-t*180,gravity:.12+t*.1,firstDelay:600-t*350,spdRate:.1+t*.15};
}

let ball={x:0,y:0,r:13,vy:0,grav:.12,gDir:1};
let obstacles=[];
const OB_W=28;
let diff=getDiff(1);
let speed=diff.baseSpeed;
let particles=[],stars=[];

function spawnP(x,y,n,c){for(let i=0;i<n;i++)particles.push({x,y,vx:(Math.random()-.5)*4,vy:(Math.random()-.5)*4,life:1,decay:.015+Math.random()*.025,sz:2+Math.random()*3,c:c||[255,255,255]});}
function initStars(){stars=[];for(let i=0;i<50;i++)stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,sz:.5+Math.random()*1.5,sp:.2+Math.random()*.6,tw:Math.random()*Math.PI*2});}

// ========== POWER-UPS ==========
let powerUps=[];
const PU_TYPES=[
    {id:'gravity',icon:'⟳',color:[100,200,255],glow:[140,230,255],bonus:3},
    {id:'speed',icon:'⚡',color:[255,100,100],glow:[255,150,120],bonus:5}
];
let lastPUScore=0;

function maybeSpawnPU(){
    if(currentLevel<3||powerUps.length>=2)return;
    const interval=currentLevel<5?12:currentLevel<10?9:7;
    if(score-lastPUScore<interval)return;
    if(Math.random()>.15)return;
    const type=PU_TYPES[Math.random()<.6?0:1];
    const m=50;
    powerUps.push({x:canvas.width+20,y:m+Math.random()*(canvas.height-m*2),type,r:10,bob:Math.random()*Math.PI*2,gl:0});
    lastPUScore=score;
    sfxPuSpawn();
}

function collectPU(pu){
    itemsCollected++;noPowerUpRun=false;
    comboCount++;comboTimer=180;
    if(comboCount>maxCombo)maxCombo=comboCount;
    const bonus=pu.type.bonus*(1+Math.floor(comboCount/2));
    score+=bonus;scoreSpan.textContent=score;
    if(comboCount>=2){comboDisplay.textContent=comboCount+'x COMBO +'+bonus;comboDisplay.style.opacity='1';}
    if(pu.type.id==='gravity')activePU.gravity={on:true,t:300};
    else activePU.speed={on:true,t:300};
    spawnP(pu.x,pu.y,15,pu.type.color);
    sfxPuCollect();
    unlockAch('first_powerup');
    if(pu.type.id==='gravity')unlockAch('gravity_flip');
    if(pu.type.id==='speed')unlockAch('speed_boost');
    if(itemsCollected>=5)unlockAch('collector_5');
    if(itemsCollected>=10)unlockAch('collector_10');
    if(comboCount>=3)unlockAch('combo_3');
    if(comboCount>=5)unlockAch('combo_5');
}

// Highscore
try{let s=localStorage.getItem('gr_hs_v3');if(s)highScore=parseInt(s)||0;highScoreSpan.textContent=highScore;}catch(e){}
function saveHS(){if(score>highScore){highScore=score;highScoreSpan.textContent=highScore;try{localStorage.setItem('gr_hs_v3',String(highScore));}catch(e){}}}

// Obstacles
function genOb(){
    const m=30,gs=diff.gapSize;
    obstacles.push({x:canvas.width+10,gY:m+Math.random()*(canvas.height-gs-m*2),gS:gs,w:OB_W,counted:false});
}
function hitTest(ob){
    const bL=ball.x-ball.r,bR=ball.x+ball.r,bT=ball.y-ball.r,bB=ball.y+ball.r;
    if(bR>ob.x&&bL<ob.x+ob.w){if(bT<ob.gY||bB>ob.gY+ob.gS)return true;}
    return false;
}

function showLvlUp(lv){
    levelUpText.textContent='LEVEL '+lv;
    levelUpFlash.style.display='flex';
    levelUpText.style.animation='none';void levelUpText.offsetWidth;
    levelUpText.style.animation='levelFlash 1.8s ease-out forwards';
    sfxLevelUp();
    setTimeout(()=>levelUpFlash.style.display='none',2000);
}

// ========== UPDATE ==========
function update(){
    if(!gameActive)return;
    frameCount++;
    currentTheme=getTheme(currentLevel);
    if(!displayTheme.bgTop)initDT(currentTheme);
    lerpDT(currentTheme,.03);

    if(!gameStarted){
        floatOffset+=.04;ball.y=canvas.height/2+Math.sin(floatOffset)*12;
        for(let s of stars){s.x-=s.sp*.3;if(s.x<0){s.x=canvas.width;s.y=Math.random()*canvas.height;}s.tw+=.02;}
        scrollOffset+=.15;return;
    }

    // Power-up timers
    if(activePU.gravity.on){activePU.gravity.t--;puGravInd.classList.add('active');puGravTimer.textContent=Math.ceil(activePU.gravity.t/60)+'s';if(activePU.gravity.t<=0){activePU.gravity.on=false;puGravInd.classList.remove('active');}}
    if(activePU.speed.on){activePU.speed.t--;puSpeedInd.classList.add('active');puSpeedTimer.textContent=Math.ceil(activePU.speed.t/60)+'s';if(activePU.speed.t<=0){activePU.speed.on=false;puSpeedInd.classList.remove('active');}}
    if(comboTimer>0){comboTimer--;if(comboTimer<=0){comboCount=0;comboDisplay.style.opacity='0';}}

    // Physics
    const gMul=activePU.gravity.on?0:1;
    const sMul=activePU.speed.on?1.4:1;
    ball.vy+=ball.grav*ball.gDir*gMul*sMul;
    ball.vy=Math.max(-9,Math.min(9,ball.vy));
    ball.y+=ball.vy;

    if(ball.y-ball.r<0||ball.y+ball.r>canvas.height){spawnP(ball.x,ball.y,20,displayTheme.ballColor1);gameOver();return;}

    for(let i=obstacles.length-1;i>=0;i--){
        let ob=obstacles[i];ob.x-=speed;
        if(ob.x+ob.w<0){obstacles.splice(i,1);continue;}
        if(hitTest(ob)){spawnP(ball.x,ball.y,25,displayTheme.wallColor);gameOver();return;}
        if(!ob.counted&&ob.x+ob.w<ball.x-ball.r){
            ob.counted=true;score++;scoreSpan.textContent=score;sfxScore();
            currentLevel=Math.floor(score/10)+1;
            if(currentLevel!==lastLevel){lastLevel=currentLevel;diff=getDiff(currentLevel);ball.grav=diff.gravity;showLvlUp(currentLevel);levelBadge.textContent='LEVEL '+currentLevel;}
            spawnP(ob.x,ob.gY+ob.gS/2,6,displayTheme.particleColor);
            if(score>=1)unlockAch('first_point');if(score>=10)unlockAch('score_10');if(score>=50)unlockAch('score_50');if(score>=100)unlockAch('score_100');
            if(currentLevel>=5)unlockAch('level_5');if(currentLevel>=10)unlockAch('level_10');
            if(noPowerUpRun&&score>=30)unlockAch('no_powerup_30');
            maybeSpawnPU();
        }
    }

    const lo=obstacles[obstacles.length-1];
    if(!lo||lo.x<canvas.width-diff.spawnDist)genOb();
    speed=diff.baseSpeed+Math.floor(score%10)*diff.spdRate*.12;

    // Power-ups move & collect
    for(let i=powerUps.length-1;i>=0;i--){
        let pu=powerUps[i];pu.x-=speed;pu.bob+=.06;pu.gl=(pu.gl+.05)%(Math.PI*2);
        const dy=ball.y-(pu.y+Math.sin(pu.bob)*8),dx=ball.x-pu.x;
        if(Math.sqrt(dx*dx+dy*dy)<ball.r+pu.r+6){collectPU(pu);powerUps.splice(i,1);continue;}
        if(pu.x<-30){powerUps.splice(i,1);comboCount=0;comboDisplay.style.opacity='0';}
    }

    for(let i=particles.length-1;i>=0;i--){let p=particles[i];p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;p.vy+=.02;if(p.life<=0)particles.splice(i,1);}
    for(let s of stars){s.x-=s.sp*(speed/diff.baseSpeed);if(s.x<0){s.x=canvas.width;s.y=Math.random()*canvas.height;}s.tw+=.03;}
    scrollOffset+=speed*.5;

    if(gameStartTime&&Date.now()-gameStartTime>=120000)unlockAch('survivor');
}

// ========== DRAW ==========
function draw(){
    const W=canvas.width,H=canvas.height,T=displayTheme;
    if(!T.bgTop)return;

    const bg=ctx.createLinearGradient(0,0,0,H);bg.addColorStop(0,rgb(T.bgTop));bg.addColorStop(1,rgb(T.bgBot));ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
    for(let s of stars){ctx.fillStyle=rgba(T.particleColor,(.3+.3*Math.sin(s.tw))*.3);ctx.fillRect(s.x,s.y,s.sz,s.sz);}
    ctx.fillStyle=rgba(T.stripColor,T.accentAlpha);const sm=scrollOffset%50;for(let i=-50;i<W+50;i+=50)ctx.fillRect(i-sm,0,24,H);
    ctx.fillStyle=rgba(T.wallGlow,.04);ctx.fillRect(0,0,W,3);ctx.fillRect(0,H-3,W,3);

    if(activePU.gravity.on){ctx.fillStyle='rgba(100,200,255,0.03)';ctx.fillRect(0,0,W,H);}
    if(activePU.speed.on){ctx.fillStyle='rgba(255,100,100,0.03)';ctx.fillRect(0,0,W,H);}

    // Obstacles
    for(let ob of obstacles){
        ctx.fillStyle=rgba(T.wallColor,.15);ctx.fillRect(ob.x+4,0,ob.w,ob.gY);ctx.fillRect(ob.x+4,ob.gY+ob.gS,ob.w,H-(ob.gY+ob.gS));
        const wg=ctx.createLinearGradient(ob.x,0,ob.x+ob.w,0);wg.addColorStop(0,rgba(T.wallColor,.7));wg.addColorStop(.5,rgba(T.wallColor,1));wg.addColorStop(1,rgba(T.wallColor,.7));ctx.fillStyle=wg;
        drawRR(ctx,ob.x,-4,ob.w,ob.gY+4,6);ctx.fill();drawRR(ctx,ob.x,ob.gY+ob.gS,ob.w,H-(ob.gY+ob.gS)+4,6);ctx.fill();
        ctx.shadowColor=rgba(T.wallGlow,.5);ctx.shadowBlur=12;ctx.fillStyle=rgba(T.wallGlow,.25);
        ctx.fillRect(ob.x,ob.gY-2,ob.w,2);ctx.fillRect(ob.x,ob.gY+ob.gS,ob.w,2);ctx.shadowBlur=0;
    }

    // Power-ups
    for(let pu of powerUps){
        const by=pu.y+Math.sin(pu.bob)*8,gs=12+Math.sin(pu.gl)*3;
        ctx.save();ctx.shadowColor=rgba(pu.type.glow,.6);ctx.shadowBlur=20;
        ctx.beginPath();ctx.arc(pu.x,by,gs,0,Math.PI*2);ctx.fillStyle=rgba(pu.type.color,.15);ctx.fill();ctx.shadowBlur=0;
        const pg=ctx.createRadialGradient(pu.x-2,by-2,2,pu.x,by,pu.r);pg.addColorStop(0,rgba(pu.type.glow,.9));pg.addColorStop(1,rgba(pu.type.color,.6));
        ctx.beginPath();ctx.arc(pu.x,by,pu.r,0,Math.PI*2);ctx.fillStyle=pg;ctx.fill();
        ctx.font='bold 11px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='#fff';ctx.fillText(pu.type.icon,pu.x,by+1);
        ctx.restore();
    }

    // Ball
    ctx.save();
    if(activePU.gravity.on){ctx.shadowColor='rgba(100,200,255,0.8)';ctx.shadowBlur=35;}
    else if(activePU.speed.on){ctx.shadowColor='rgba(255,100,100,0.8)';ctx.shadowBlur=35;}
    else{ctx.shadowColor=rgba(T.ballGlow,.6);ctx.shadowBlur=25;}
    ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);
    const bG=ctx.createRadialGradient(ball.x-3,ball.y-3,2,ball.x,ball.y,ball.r+2);bG.addColorStop(0,rgb(T.ballColor1));bG.addColorStop(1,rgb(T.ballColor2));ctx.fillStyle=bG;ctx.fill();ctx.shadowBlur=0;
    ctx.beginPath();ctx.arc(ball.x-3,ball.y-4,4,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,.35)';ctx.fill();ctx.restore();

    if(gameStarted){
        ctx.globalAlpha=.15;ctx.beginPath();ctx.arc(ball.x-speed*1.5,ball.y-ball.vy*.5,ball.r*.7,0,Math.PI*2);ctx.fillStyle=rgba(T.ballGlow,.3);ctx.fill();
        ctx.globalAlpha=.08;ctx.beginPath();ctx.arc(ball.x-speed*3,ball.y-ball.vy*1,ball.r*.4,0,Math.PI*2);ctx.fillStyle=rgba(T.ballGlow,.2);ctx.fill();ctx.globalAlpha=1;
    }

    for(let p of particles){ctx.globalAlpha=p.life;ctx.fillStyle=rgb(p.c);ctx.fillRect(p.x-p.sz/2,p.y-p.sz/2,p.sz,p.sz);}ctx.globalAlpha=1;

    if(gameStarted&&!activePU.gravity.on){
        const ay=ball.gDir===1?ball.y+28:ball.y-28;ctx.fillStyle=rgba(T.ballGlow,.2);ctx.font='bold 16px sans-serif';ctx.textAlign='center';ctx.fillText(ball.gDir===1?'▼':'▲',ball.x,ay);
    }
    if(gameStarted&&activePU.gravity.on){ctx.fillStyle='rgba(100,200,255,0.3)';ctx.font='bold 14px sans-serif';ctx.textAlign='center';ctx.fillText('~',ball.x,ball.y+28);}
}

function drawRR(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();}

// ========== GAME OVER & START ==========
function gameOver(){
    gameActive=false;gameStarted=false;saveHS();sfxGameOver();
    finalScoreSpan.textContent=score;bestDisplay.textContent='BEST: '+highScore;
    newHighSpan.textContent=(score>=highScore&&score>0)?'★ NEUER HIGHSCORE ★':'';
    goLevel.textContent=currentLevel;goItems.textContent=itemsCollected;goCombo.textContent=maxCombo;
    gameOverScreen.style.display='flex';readyText.style.display='none';
    puGravInd.classList.remove('active');puSpeedInd.classList.remove('active');comboDisplay.style.opacity='0';
    renderAchievements();
}

function startGame(){
    ensureAudio();gameActive=true;gameStarted=false;
    score=0;currentLevel=1;lastLevel=1;frameCount=0;scrollOffset=0;
    itemsCollected=0;maxCombo=0;comboCount=0;comboTimer=0;noPowerUpRun=true;lastPUScore=0;
    scoreSpan.textContent='0';levelBadge.textContent='LEVEL 1';
    diff=getDiff(1);speed=diff.baseSpeed;
    ball.grav=diff.gravity;ball.y=canvas.height/2;ball.vy=0;ball.gDir=1;
    obstacles=[];particles=[];powerUps=[];
    activePU={gravity:{on:false,t:0},speed:{on:false,t:0}};
    genOb();obstacles[0].x=canvas.width+diff.firstDelay;
    currentTheme=getTheme(1);initDT(currentTheme);
    startScreen.style.display='none';gameOverScreen.style.display='none';readyText.style.display='block';gameStartTime=0;
}

// ========== INPUT ==========
function handleInput(e){
    if(e)e.preventDefault();if(!gameActive)return;
    if(!gameStarted){gameStarted=true;readyText.style.display='none';gameStartTime=Date.now();sfxTap();return;}
    ball.gDir*=-1;
    if(!activePU.gravity.on)ball.vy*=.3;
    spawnP(ball.x,ball.y,3,displayTheme.ballGlow);sfxTap();
}
canvas.addEventListener('click',handleInput);
canvas.addEventListener('touchstart',handleInput,{passive:false});
document.addEventListener('keydown',e=>{if(e.code==='Space')handleInput(e);});
startBtn.addEventListener('click',startGame);
restartBtn.addEventListener('click',startGame);

// ========== LOOP ==========
function loop(){update();draw();requestAnimationFrame(loop);}
function resize(){const c=document.getElementById('gameContainer');canvas.width=c.clientWidth;canvas.height=c.clientHeight;ball.x=canvas.width*.22;ball.y=canvas.height/2;initStars();}
window.addEventListener('resize',resize);resize();
highScoreSpan.textContent=highScore;currentTheme=getTheme(1);initDT(currentTheme);loop();
})();
</script>
</body>
